# Front reverse proxy for the web tier. It owns the public port and load-balances
# across `web` replicas via Docker's embedded DNS (127.0.0.11). Because the
# upstream host is a variable, nginx re-resolves it per request, so replicas that
# scale in/out during a rolling deploy are discovered within the resolver TTL.
# proxy_next_upstream retries a sibling replica if one is draining, so a request
# is never dropped mid-swap.
server {
    listen 80;

    resolver 127.0.0.11 valid=2s ipv6=off;

    location / {
        set $web web;
        proxy_pass http://$web:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Fail fast off a draining replica and try another one well within any
        # client's patience (connect timeout << typical client timeout).
        proxy_connect_timeout 1s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 5s;
    }
}
