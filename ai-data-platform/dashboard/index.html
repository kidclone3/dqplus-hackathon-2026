<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deal-flow Matchmaker</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d; --fg: #e6edf3;
    --muted: #8b949e; --accent: #2f81f7; --good: #3fb950; --warn: #d29922;
    --bad: #f85149; --chip: #21262d;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg); }
  header { display: flex; align-items: center; gap: 16px; padding: 12px 20px;
    border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; z-index: 5; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .spacer { flex: 1; }
  .stat { font-size: 12px; color: var(--muted); }
  .stat b { color: var(--fg); font-size: 14px; }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 6px;
    padding: 7px 12px; font-size: 13px; cursor: pointer; }
  button:hover { filter: brightness(1.1); }
  button.ghost { background: var(--chip); color: var(--fg); border: 1px solid var(--border); }
  .layout { display: grid; grid-template-columns: 280px 1fr 320px; gap: 0; height: calc(100vh - 53px); }
  .col { overflow-y: auto; padding: 14px; }
  .col.left { border-right: 1px solid var(--border); }
  .col.right { border-left: 1px solid var(--border); background: var(--panel); }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
    margin: 0 0 8px; font-weight: 600; }
  .section { margin-bottom: 22px; }
  .ent { padding: 7px 9px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; gap: 6px; }
  .ent:hover { background: var(--chip); }
  .ent.sel { background: #1f6feb33; outline: 1px solid var(--accent); }
  .ent .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ent .ty { font-size: 10px; color: var(--muted); }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--chip);
    color: var(--muted); white-space: nowrap; }
  .badge.ready { color: var(--good); } .badge.seeded { color: var(--warn); }
  .mc { font-size: 11px; color: var(--accent); }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; margin-bottom: 12px; }
  .match-head { display: flex; align-items: baseline; gap: 10px; }
  .match-head .score { font-size: 20px; font-weight: 700; color: var(--accent); }
  .match-head .pname { font-size: 15px; font-weight: 600; }
  .kv { display: flex; gap: 12px; flex-wrap: wrap; margin: 6px 0; font-size: 12px; color: var(--muted); }
  .rationale { margin: 8px 0; }
  .rationale .lbl { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: .05em; }
  details { margin-top: 8px; }
  summary { cursor: pointer; color: var(--accent); font-size: 12px; }
  pre { white-space: pre-wrap; word-wrap: break-word; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px; font: 12px/1.5 ui-monospace, Menlo, monospace; margin: 6px 0; max-height: 320px; overflow: auto; }
  .status-ready { color: var(--good); } .status-ranked { color: var(--warn); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0 2px; }
  .subhead { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted);
    margin: 14px 0 6px; font-weight: 600; border-top: 1px solid var(--border); padding-top: 10px; }
  .fld { display: flex; gap: 8px; align-items: baseline; padding: 3px 0; flex-wrap: wrap; }
  .fld .fk { color: var(--muted); min-width: 130px; font-size: 12px; text-transform: capitalize; }
  .fld .fv { flex: 1; min-width: 160px; }
  .fld.nested { display: block; }
  .fld.nested > .fk { display: block; margin-bottom: 2px; }
  .nest { border-left: 1px solid var(--border); padding-left: 10px; margin-left: 4px; }
  .src { font-size: 10px; color: var(--accent); text-decoration: none; white-space: nowrap; }
  .src:hover { text-decoration: underline; }
  .conf { font-size: 10px; color: var(--muted); }
  .rel { display: flex; gap: 8px; align-items: baseline; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .rel .rk { color: var(--accent); font-size: 11px; }
  .rel .unres { color: var(--muted); font-style: italic; }
  .rel .arrow { color: var(--muted); }
  a.lnk { color: var(--accent); text-decoration: none; } a.lnk:hover { text-decoration: underline; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  td, th { text-align: left; padding: 3px 4px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  .ev { font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .ev .k { font-weight: 600; }
  .ev .t { color: var(--muted); margin-left: auto; white-space: nowrap; }
  .kind-Verified, .kind-DraftReady { color: var(--good); }
  .kind-VerifyRejected, .kind-DraftDeadLettered { color: var(--bad); }
  .kind-MatchesRanked, .kind-FilterCompleted { color: var(--accent); }
  .empty { color: var(--muted); font-style: italic; padding: 20px 0; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
  .dot.busy { background: var(--warn); } .dot.idle { background: var(--good); }
  .dot.dead { background: var(--bad); } .dot.starting { background: var(--accent); }
  .costbar { height: 6px; background: var(--accent); border-radius: 3px; }

  /* --- toggleable sidebar --- */
  .layout { transition: grid-template-columns .3s ease; }
  .layout.hide-left { grid-template-columns: 0 1fr 320px; }
  .layout.hide-left .col.left { display: none; }
  #toggle-left-btn { padding: 4px 10px; font-size: 16px; line-height: 1; }

  /* --- investor discovery workspace (/discover) --- */
  .match-lab { position: relative; overflow: hidden;
    background: linear-gradient(135deg, rgba(22,27,34,.5), rgba(31,111,235,.09)); border-color: #1f6feb44; }
  .lab-kicker { color: var(--accent); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; }
  .lab-title { margin: 6px 0 4px; max-width: 620px; font-size: 22px; line-height: 1.2; font-weight: 700;
    text-transform: none; letter-spacing: -.01em; color: var(--fg); }
  .lab-copy { margin: 0 0 14px; max-width: 660px; color: var(--muted); font-size: 12px; }
  .query-box { display: flex; gap: 8px; align-items: stretch; }
  .query-box textarea { width: 100%; min-height: 74px; resize: vertical; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; color: var(--fg); background: var(--bg);
    font: 13px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif; outline: none; }
  .query-box textarea:focus { border-color: var(--accent); }
  .query-box button { min-width: 130px; }
  .prompt-chips { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; }
  .prompt-chip { background: var(--chip); color: var(--fg); border: 1px solid var(--border);
    border-radius: 99px; padding: 4px 10px; font-size: 11px; }
  .discovery-summary { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin: 18px 0 10px; }
  .discovery-summary h2 { margin: 0; color: var(--fg); }
  .discovery-count { color: var(--accent); font-size: 12px; }
  .candidate-list { display: grid; gap: 9px; }
  .candidate { padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel);
    transition: border-color .18s ease, transform .18s ease; }
  .candidate:hover { transform: translateY(-1px); border-color: var(--accent); }
  .candidate-top { display: flex; align-items: center; gap: 9px; }
  .candidate-name { font-weight: 600; margin-right: auto; }
  .fit { min-width: 42px; padding: 4px 6px; border-radius: 6px; text-align: center; font-size: 11px; font-weight: 700;
    color: var(--good); background: rgba(63,185,80,.13); border: 1px solid rgba(63,185,80,.27); }
  .candidate-copy { color: var(--muted); font-size: 12px; margin: 7px 0; }
  .candidate-actions { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .candidate-actions button { padding: 4px 8px; font-size: 11px; }
  .fit-slider-bar { display: flex; align-items: center; gap: 12px; padding: 8px 0 12px; }
  .fit-slider-bar label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .fit-slider-bar input[type=range] { flex: 1; height: 5px; -webkit-appearance: none; appearance: none;
    background: linear-gradient(90deg, var(--bad), var(--warn), var(--good)); border-radius: 99px; outline: none; cursor: pointer; }
  .fit-slider-bar input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: var(--fg); border: 3px solid var(--accent); cursor: grab; }
  .fit-slider-bar input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%;
    background: var(--fg); border: 3px solid var(--accent); cursor: grab; }
  .fit-slider-val { width: 54px; padding: 4px; border: 1px solid var(--border); border-radius: 6px;
    color: var(--accent); text-align: center; background: var(--bg); font-size: 13px; font-weight: 700; outline: none; -moz-appearance: textfield; }
  .fit-slider-val::-webkit-inner-spin-button, .fit-slider-val::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .fit-slider-val:focus { border-color: var(--accent); }
</style>
</head>
<body>
<header>
  <button id="toggle-left-btn" class="ghost" title="Toggle sidebar" aria-label="Toggle sidebar">☰</button>
  <h1>Deal-flow Matchmaker</h1>
  <div class="stat">LLM cost <b id="hdr-cost">—</b></div>
  <div class="stat">/entity <b id="hdr-cpe">—</b></div>
  <div class="stat">/match <b id="hdr-cpm">—</b></div>
  <div class="spacer"></div>
  <div class="stat" id="pulse">live</div>
  <button id="run-btn" class="ghost">Run outreach (all)</button>
</header>

<div class="layout">
  <div class="col left">
    <div class="section">
      <h2>Startups</h2>
      <div id="startups"></div>
    </div>
    <div class="section">
      <h2>Partners</h2>
      <div id="partners"></div>
    </div>
  </div>

  <div class="col mid">
    <div id="detail"><div class="empty">Select a startup to see its ranked matches, rationale and drafts.</div></div>
  </div>

  <div class="col right">
    <div class="section">
      <h2>LLM Cost</h2>
      <div id="costs"></div>
    </div>
    <div class="section">
      <h2>Pool &amp; Queue Health</h2>
      <div id="health"></div>
    </div>
    <div class="section">
      <h2>Event Stream</h2>
      <div id="events"></div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let selected = null;

// Served at "/" locally but under a prefix (e.g. /agent/) behind the VPS nginx —
// prefix every absolute API path with wherever the page itself is mounted.
const API_BASE = location.pathname.replace(/\/$/, "");
async function j(path, opts) {
  const r = await fetch(API_BASE + path, opts);
  if (!r.ok) throw new Error(path + " " + r.status);
  return r.json();
}
const usd = (v) => (v == null ? "—" : "$" + Number(v).toFixed(4));
const short = (t) => t ? new Date(t).toLocaleTimeString() : "";

async function loadEntities() {
  const ents = await j("/entities");
  const startups = ents.filter(e => e.type === "startup");
  const partners = ents.filter(e => e.type !== "startup");
  $("startups").innerHTML = startups.length ? startups.map(e => `
    <div class="ent ${selected === e.id ? "sel" : ""}" data-id="${e.id}">
      <span class="nm">${e.name}</span>
      ${e.match_count ? `<span class="mc">${e.match_count}★</span>` : ""}
      <span class="badge ${e.status}">${e.status}</span>
    </div>`).join("") : `<div class="empty">No startups onboarded yet.</div>`;
  $("partners").innerHTML = partners.length ? partners.map(e => `
    <div class="ent ${selected === e.id ? "sel" : ""}" data-id="${e.id}">
      <span class="nm">${e.name}<br><span class="ty">${e.type.replace("_"," ")}</span></span>
      ${e.match_count ? `<span class="mc">${e.match_count}★</span>` : ""}
      <span class="badge ${e.status}">${e.status}</span>
    </div>`).join("") : `<div class="empty">No partners.</div>`;
  document.querySelectorAll(".ent[data-id]").forEach(el =>
    el.onclick = () => { selected = el.dataset.id; loadEntities(); loadDetail(); });
}

// ---- generic profile rendering (provenance-aware) --------------------------
const RESERVED = new Set(
  ["seed", "normalized", "relationships", "collection_summary", "entity_type", "edges"]);

function isProv(v) {
  return v && typeof v === "object" && !Array.isArray(v) && ("value" in v);
}
function pick(v) {  // unwrap {value,...} → value, else identity
  return isProv(v) ? v.value : v;
}
function provMeta(v) {
  let s = "";
  if (v.source_url) s += ` <a class="src" href="${escapeAttr(v.source_url)}" target="_blank" rel="noopener">source ↗</a>`;
  if (v.confidence != null) s += ` <span class="conf">${typeof v.confidence === "number" ? v.confidence.toFixed(2) : escapeHtml(v.confidence)}</span>`;
  return s;
}
function fmtScalar(v) {
  if (v == null || v === "") return "";
  return escapeHtml(typeof v === "object" ? JSON.stringify(v) : v);
}
function valBody(v) {
  if (Array.isArray(v))
    return v.map(x => typeof x === "object" && x !== null
      ? escapeHtml(JSON.stringify(x)) : `<span class="badge">${escapeHtml(x)}</span>`).join(" ");
  return fmtScalar(v);
}
function renderField(key, val) {
  if (val == null || val === "") return "";
  if (isProv(val))
    return `<div class="fld"><span class="fk">${escapeHtml(key)}</span>
      <span class="fv">${valBody(val.value)}${provMeta(val)}</span></div>`;
  if (Array.isArray(val)) {
    if (!val.length) return "";
    if (val.every(x => typeof x !== "object" || x === null))
      return `<div class="fld"><span class="fk">${escapeHtml(key)}</span>
        <span class="fv chips">${val.map(x => `<span class="badge">${escapeHtml(x)}</span>`).join("")}</span></div>`;
    return `<div class="fld nested"><span class="fk">${escapeHtml(key)}</span>
      <div class="nest">${val.map((x, i) => renderField("#" + (i + 1), x)).join("")}</div></div>`;
  }
  if (typeof val === "object") {
    const rows = Object.entries(val).map(([k, v]) => renderField(k, v)).join("");
    return rows ? `<div class="fld nested"><span class="fk">${escapeHtml(key)}</span>
      <div class="nest">${rows}</div></div>` : "";
  }
  return `<div class="fld"><span class="fk">${escapeHtml(key)}</span><span class="fv">${fmtScalar(val)}</span></div>`;
}

function chipRow(vals) {
  const items = (vals || []).map(pick).filter(v => v != null && v !== "");
  return items.length ? `<div class="chips">${items.map(s =>
    `<span class="badge">${escapeHtml(typeof s === "object" ? JSON.stringify(s) : s)}</span>`).join("")}</div>` : "";
}

function matchCard(m, headlineName, headlineType) {
  return `<div class="card">
    <div class="match-head">
      <span class="score">${m.composite != null ? Math.round(m.composite) : "?"}</span>
      <span class="pname">${escapeHtml(headlineName)}</span>
      <span class="badge">${escapeHtml((headlineType || "").replace("_", " "))}</span>
      <span class="badge status-${m.status}">${m.status}</span>
    </div>
    <div class="kv">
      <span>semantic ${m.semantic != null ? Number(m.semantic).toFixed(2) : "—"}</span>
      <span>sector overlap ${m.sector_overlap != null ? Number(m.sector_overlap).toFixed(2) : "—"}</span>
    </div>
    ${m.rationale_en ? `<div class="rationale"><div class="lbl">Rationale (EN)</div>${escapeHtml(m.rationale_en)}</div>` : ""}
    ${m.rationale_vi ? `<div class="rationale"><div class="lbl">Rationale (VI)</div>${escapeHtml(m.rationale_vi)}</div>` : ""}
    ${m.draft_en ? `<details><summary>Draft email (EN)</summary><pre>${escapeHtml(m.draft_en)}</pre></details>` : ""}
    ${m.draft_vi ? `<details><summary>Draft email (VI)</summary><pre>${escapeHtml(m.draft_vi)}</pre></details>` : ""}
  </div>`;
}

function relRow(e) {
  const other = e.direction === "out"
    ? (e.dst_entity_name || e.dst_name || e.dst_id)
    : (e.src_name || e.src_id);
  const resolvable = e.direction === "out" && e.dst_resolved && e.dst_id;
  const nameHtml = resolvable
    ? `<a class="lnk" data-goto="${escapeAttr(e.dst_id)}" href="#">${escapeHtml(other)}</a>`
    : `<span class="${e.dst_resolved || e.direction === "in" ? "" : "unres"}">${escapeHtml(other)}</span>`;
  const arrow = e.direction === "out" ? "→" : "←";
  return `<div class="rel"><span class="rk">${escapeHtml(e.kind)}</span>
    <span class="arrow">${arrow}</span>${nameHtml}
    ${e.source_url ? `<a class="src" href="${escapeAttr(e.source_url)}" target="_blank" rel="noopener">source ↗</a>` : ""}</div>`;
}

function graphRow(p) {
  // p: {target_id, target_name, target_type, distance, path: [{from_id,to_id,kind,source_url,hop}]}
  const viaKinds = p.path.map(h => h.kind).join(" → ");
  const firstSrc = (p.path.find(h => h.source_url) || {}).source_url;
  return `<div class="rel">
    <a class="lnk" data-goto="${escapeAttr(p.target_id)}" href="#">${escapeHtml(p.target_name)}</a>
    <span class="badge">${escapeHtml((p.target_type || "").replace("_", " "))}</span>
    <span class="arrow">${p.distance}-hop</span>
    <span class="rk">${escapeHtml(viaKinds)}</span>
    ${firstSrc ? `<a class="src" href="${escapeAttr(firstSrc)}" target="_blank" rel="noopener">source ↗</a>` : ""}
  </div>`;
}

// ---- investor discovery workspace (GET /discover) --------------------------
function defaultDiscoveryQuery(ent) {
  const p = ent.profile || {};
  const norm = p.normalized || {};
  const sectors = (p.sectors || norm.sectors || []).map(pick).filter(Boolean);
  const country = pick(p.country) || pick((p.seed || {}).country) || "";
  return `Find investors for ${ent.name}${sectors.length ? ` in ${sectors.join(", ")}` : ""}${country ? `, active in ${country}` : ""}.`;
}

// Keeps the workspace usable against an older running API until /discover ships.
async function discoveryFallback(startup, query) {
  const words = s => new Set((String(s).toLowerCase().match(/[a-z0-9][a-z0-9_-]{1,}/g) || []));
  const sp = startup.profile || {};
  const startupTerms = words(JSON.stringify(sp)), queryTerms = words(query);
  const country = String(pick(sp.country) || pick((sp.seed || {}).country) || "").toLowerCase();
  const investors = await j("/entities?type=investor");
  const profiles = await Promise.all(investors.map(async inv =>
    ({ ...inv, ...(await j("/entities/" + encodeURIComponent(inv.id))) })));
  return { startup_id: startup.id, startup_name: startup.name, query, results: profiles.map(inv => {
    const p = inv.profile || {}, text = `${inv.name} ${JSON.stringify(p)}`.toLowerCase(), terms = words(text);
    const queryHits = [...queryTerms].filter(t => terms.has(t));
    const profileHits = [...startupTerms].filter(t => terms.has(t) && !["country", "sectors", "startup"].includes(t));
    let score = 24 + Math.min(28, queryHits.length * 9) + Math.min(22, profileHits.length * 5);
    if (country && text.includes(country)) score += 18;
    const signals = [p.country, p.note, p.sectors, p.focus, p.stage].filter(Boolean)
      .map(x => Array.isArray(x) ? x.join(", ") : String(x));
    return { id: inv.id, name: inv.name, type: "investor", status: inv.status, score: Math.min(100, score),
      query_hits: queryHits, profile_hits: profileHits, signals: signals.slice(0, 3), existing_match: false, rationale: null };
  }).sort((a, b) => b.score - a.score || a.name.localeCompare(b.name)).slice(0, 10) };
}

function applyFitFilter(minScore) {
  let visible = 0;
  document.querySelectorAll(".candidate[data-score]").forEach(el => {
    const show = Number(el.dataset.score) >= minScore;
    el.style.display = show ? "" : "none";
    if (show) visible++;
  });
  const countEl = document.querySelector(".discovery-count");
  if (countEl) countEl.textContent = `${visible} candidates`;
}

async function runDiscovery(startup, query) {
  const host = $("discovery-results");
  if (!host) return;
  host.innerHTML = `<div class="empty">Finding matching investors and signals…</div>`;
  try {
    let data;
    try { data = await j(`/discover?startup_id=${encodeURIComponent(startup.id)}&query=${encodeURIComponent(query)}&limit=10`); }
    catch (e) { data = await discoveryFallback(startup, query); }
    const results = data.results || [];
    const minScore = results.length ? Math.min(...results.map(r => r.score)) : 0;
    host.innerHTML = `<div class="discovery-summary"><h2>Investor candidates</h2><span class="discovery-count">${results.length} candidates</span></div>
      <div class="fit-slider-bar"><label>Min fit</label>
        <input type="range" id="fit-range" min="0" max="100" value="${minScore}" step="1" aria-label="Minimum fit score">
        <input type="number" class="fit-slider-val" id="fit-val" min="0" max="100" value="${minScore}" step="1" aria-label="Minimum fit score">
        <span class="conf">%</span></div>
      <div class="candidate-list">${results.map(r => `<article class="candidate" data-score="${r.score}">
        <div class="candidate-top"><span class="candidate-name">${escapeHtml(r.name)}</span><span class="badge">investor</span><span class="fit">${r.score}%</span></div>
        <div class="candidate-copy">${escapeHtml(r.rationale || (r.signals || []).join(" · ") || "Profile found — open the investor to see details.")}</div>
        <div class="candidate-actions"><div class="chips">${(r.query_hits || []).slice(0, 3).map(x => `<span class="badge">${escapeHtml(x)}</span>`).join("")}${r.existing_match ? `<span class="badge ready">ranked</span>` : ""}</div>
          <button class="ghost open-investor" type="button" data-id="${escapeAttr(r.id)}">View profile</button></div>
      </article>`).join("") || `<div class="empty">No matching investor profiles yet.</div>`}</div>`;
    host.querySelectorAll(".open-investor").forEach(button =>
      button.onclick = () => { selected = button.dataset.id; loadEntities(); loadDetail(); });
    if (results.length) {
      applyFitFilter(minScore);
      const syncFilter = (val, fromInput = false) => {
        val = Math.max(0, Math.min(100, Number(val) || 0));
        if (!fromInput) $("fit-val").value = val;
        $("fit-range").value = val;
        applyFitFilter(val);
      };
      $("fit-range").addEventListener("input", (e) => syncFilter(e.target.value, false));
      $("fit-val").addEventListener("input", (e) => { if (e.target.value !== "") syncFilter(e.target.value, true); });
      $("fit-val").addEventListener("change", (e) => syncFilter(e.target.value, false));
    }
  } catch (e) { host.innerHTML = `<div class="empty">Could not discover investors: ${escapeHtml(e.message)}</div>`; }
}

async function loadDetail() {
  if (!selected) return;
  let ent;
  try { ent = await j("/entities/" + encodeURIComponent(selected)); }
  catch (e) { $("detail").innerHTML = `<div class="empty">Failed to load entity: ${escapeHtml(e.message)}</div>`; return; }

  const prof = ent.profile || {};
  const isStartup = ent.type === "startup";
  const norm = prof.normalized || {};
  const seed = prof.seed || (ent.status === "ready" ? {} : prof);
  const edges = ent.edges || [];
  const desc = pick(norm.description_en) || pick(prof.description) || "";
  const website = pick(seed.hint_website) || pick(seed.website) || pick(prof.website);

  let matches = [];
  try {
    matches = await j("/matches?" + (isStartup ? "startup_id=" : "partner_id=") + encodeURIComponent(selected));
  } catch (e) { /* matches optional */ }
  let graphMatches = [];
  try {
    const gm = await j("/entities/" + encodeURIComponent(selected) + "/graph-matches?max_hops=2");
    graphMatches = gm.matches || [];
  } catch (e) { /* graph-matches optional */ }

  // query-first matchmaking workspace for startups (/discover)
  let html = isStartup ? `<section class="card match-lab">
    <div class="lab-kicker">Investor discovery</div>
    <h2 class="lab-title">Turn this startup into a conversation with the right investors.</h2>
    <p class="lab-copy">Describe the round, stage, sector or region. The system builds a transparent shortlist from investor profiles; use the outreach run when you're ready to rank and draft.</p>
    <div class="query-box">
      <textarea id="investor-query" aria-label="Investor discovery query" placeholder="e.g. seed investors in Southeast Asia for an enterprise AI startup">${escapeHtml(defaultDiscoveryQuery(ent))}</textarea>
      <button id="find-investors" type="button">Find investors</button>
    </div>
    <div class="prompt-chips">
      <button class="prompt-chip" type="button" data-prompt="Seed investors in Vietnam for AI startups">Seed Vietnam</button>
      <button class="prompt-chip" type="button" data-prompt="Investors focused on enterprise software and AI">Enterprise AI</button>
      <button class="prompt-chip" type="button" data-prompt="Early-stage investors active in Southeast Asia">Southeast Asia</button>
    </div>
    <div id="discovery-results"></div>
  </section>` : "";

  // header card
  html += `<div class="card">
    <div class="match-head">
      <span class="pname">${escapeHtml(ent.name)}</span>
      <span class="badge">${escapeHtml(ent.type.replace("_", " "))}</span>
      <span class="badge ${ent.status}">${ent.status}</span>
    </div>
    ${chipRow(norm.sectors)}
    ${desc ? `<div class="rationale">${escapeHtml(desc)}</div>` : ""}
    <div class="kv">
      ${pick(seed.country) ? `<span>📍 ${escapeHtml(pick(seed.country))}</span>` : ""}
      ${pick(norm.stage) ? `<span>stage ${escapeHtml(pick(norm.stage))}</span>` : ""}
      ${website ? `<span>🔗 <a class="lnk" href="${escapeAttr(/^https?:/.test(website) ? website : "https://" + website)}" target="_blank" rel="noopener">${escapeHtml(website)}</a></span>` : ""}
    </div>
  </div>`;

  // matching profile (normalized fields, R2)
  const looking = (norm.looking_for || []).map(pick).filter(Boolean);
  if ((norm.sectors && norm.sectors.length) || looking.length || pick(norm.description_vi)) {
    html += `<div class="card">
      <div class="subhead" style="border:0;padding:0;margin:0 0 8px">Matching profile</div>
      ${renderField("sectors", norm.sectors)}
      ${renderField("looking for", norm.looking_for)}
      ${norm.stage ? renderField("stage", norm.stage) : ""}
      ${pick(norm.description_vi) ? renderField("description (vi)", pick(norm.description_vi)) : ""}
    </div>`;
  }

  // seed facts
  const seedRows = Object.entries(seed).map(([k, v]) => renderField(k.replace(/^hint_/, ""), v)).join("");
  if (seedRows)
    html += `<div class="card"><div class="subhead" style="border:0;padding:0;margin:0 0 8px">Seed</div>${seedRows}</div>`;

  // enriched profile sections (generic, provenance-aware)
  const enrichRows = Object.entries(prof)
    .filter(([k]) => !RESERVED.has(k) && !(k in seed))
    .map(([k, v]) => renderField(k, v)).join("");
  if (enrichRows)
    html += `<div class="card"><div class="subhead" style="border:0;padding:0;margin:0 0 8px">Enriched profile</div>${enrichRows}</div>`;

  // relationships
  if (edges.length)
    html += `<div class="card"><div class="subhead" style="border:0;padding:0;margin:0 0 8px">Relationships (${edges.length})</div>
      ${edges.map(relRow).join("")}</div>`;

  // graph-discovered matches (name-resolved BFS over edges, up to 2 hops — spine/graph.py)
  if (graphMatches.length)
    html += `<div class="card"><div class="subhead" style="border:0;padding:0;margin:0 0 8px">Graph-discovered matches (${graphMatches.length})</div>
      ${graphMatches.map(graphRow).join("")}</div>`;

  // matches — ranked partners for a startup, reverse (interested startups) for a partner
  if (!matches.length) {
    html += `<div class="empty">No matches yet${isStartup ? ". Trigger a run, then start the supervisor with --drain." : " for this partner."}</div>`;
  } else {
    html += `<h2>${isStartup ? "Ranked matches" : "Matched startups"} (${matches.length})</h2>`;
    html += matches.map(m => isStartup
      ? matchCard(m, m.partner_name || m.partner_id, m.partner_type)
      : matchCard(m, m.startup_name || m.startup_id, "startup")).join("");
  }

  // raw profile
  html += `<details><summary>Raw profile JSON</summary><pre>${escapeHtml(JSON.stringify(prof, null, 2))}</pre></details>`;

  $("detail").innerHTML = html;
  $("detail").querySelectorAll("a[data-goto]").forEach(a =>
    a.onclick = (ev) => { ev.preventDefault(); selected = a.dataset.goto; loadEntities(); loadDetail(); });
  if (isStartup) {
    const queryBox = $("investor-query");
    $("find-investors").onclick = () => runDiscovery(ent, queryBox.value.trim());
    $("detail").querySelectorAll(".prompt-chip").forEach(button =>
      button.onclick = () => { queryBox.value = button.dataset.prompt; queryBox.focus(); });
    await runDiscovery(ent, queryBox.value.trim());
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
}
function escapeAttr(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

async function loadCosts() {
  const c = await j("/costs");
  $("hdr-cost").textContent = usd(c.total.cost_usd);
  $("hdr-cpe").textContent = usd(c.cost_per_ready_entity);
  $("hdr-cpm").textContent = usd(c.cost_per_match);
  const max = Math.max(1e-9, ...c.by_agent.map(a => a.cost_usd));
  $("costs").innerHTML = `
    <table><tr><th>agent</th><th>turns</th><th>cost</th></tr>
    ${c.by_agent.map(a => `<tr><td>${a.agent}<br>
      <div class="costbar" style="width:${Math.round(100*a.cost_usd/max)}%"></div></td>
      <td>${a.turns}</td><td>${usd(a.cost_usd)}</td></tr>`).join("")}
    </table>
    <div class="stat" style="margin-top:8px">${c.total.tokens_in.toLocaleString()} in /
      ${c.total.tokens_out.toLocaleString()} out tokens · ${c.total.turns} turns</div>`;
}

async function loadHealth() {
  const m = await j("/metrics");
  const w = m.workers || {};
  const wchips = Object.keys(w).length ? Object.entries(w).map(([s,n]) =>
    `<span class="badge"><span class="dot ${s}"></span>${s} ${n}</span>`).join(" ")
    : `<span class="empty">no workers registered</span>`;
  const jobs = m.jobs_by_stage_status || [];
  $("health").innerHTML = `
    <div style="margin-bottom:8px">${wchips}</div>
    <div class="kv">
      <span>ready <b>${m.queue.ready}</b></span>
      <span>leased <b>${m.queue.leased}</b></span>
      <span>dead-letter <b>${m.queue.dead_letter}</b></span>
    </div>
    <table style="margin-top:6px"><tr><th>stage</th><th>status</th><th>n</th></tr>
    ${jobs.map(x => `<tr><td>${x.stage}</td><td>${x.status}</td><td>${x.n}</td></tr>`).join("")}
    </table>`;
}

async function loadEvents() {
  const evs = await j("/events?limit=20");
  $("events").innerHTML = evs.length ? evs.map(e => `
    <div class="ev">
      <span class="k kind-${e.kind}">${e.kind}</span>
      <span class="t">${short(e.created_at)}</span>
    </div>`).join("") : `<div class="empty">No events yet.</div>`;
}

async function refresh() {
  try {
    await Promise.all([loadEntities(), loadCosts(), loadHealth(), loadEvents()]);
    // Detail is not re-rendered on the interval: it holds the discovery query box
    // and fit slider, which a re-render would reset. It reloads on selection/navigation.
    $("pulse").textContent = "live · " + new Date().toLocaleTimeString();
    $("pulse").style.color = "var(--good)";
  } catch (e) {
    $("pulse").textContent = "error: " + e.message;
    $("pulse").style.color = "var(--bad)";
  }
}

$("run-btn").onclick = async () => {
  $("run-btn").disabled = true;
  try {
    const r = await j("/runs", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({all: true}),
    });
    $("pulse").textContent = `triggered ${r.count} saga(s) · ${r.trace_id}`;
  } catch (e) { $("pulse").textContent = "run failed: " + e.message; }
  finally { $("run-btn").disabled = false; refresh(); }
};

$("toggle-left-btn").onclick = () =>
  document.querySelector(".layout").classList.toggle("hide-left");

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
